<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Gemini Side Panel</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="theme">
  <div id="app" class="sp-container">
    <header class="sp-header">
      <div class="logo">Gemini</div>
      <div class="sp-actions">
        <button id="clearBtn" class="btn ghost">Clear</button>
        <button id="settingsBtn" class="btn ghost">Settings</button>
      </div>
    </header>
    <main class="sp-main">
      <div id="messages" class="chat"></div>
    </main>
    <footer class="sp-footer">
      <textarea id="input" placeholder="Ask Gemini... (Shift+Enter for newline)" rows="2"></textarea>
      <button id="sendBtn" class="btn primary">Send</button>
    </footer>
  </div>
  <script type="module" src="sidepanel.js"></script>
</body>
</html>

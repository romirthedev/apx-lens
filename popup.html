<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APX Lens</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="popup-container">
        <div class="header">
            <div class="logo">
                <div class="logo-icon">🔍</div>
                <h1>APX Lens</h1>
            </div>
        </div>
        
        <div class="content">
            <p class="description">AI-powered assistant for your browsing experience</p>
            
            <button id="openSidebar" class="primary-btn">
                <span class="btn-icon">💬</span>
                Open AI Chat
            </button>
            
            <button id="captureContent" class="secondary-btn">
                <span class="btn-icon">📄</span>
                Analyze Page
            </button>
        </div>
        
        <div class="footer">
            <div class="status" id="status">Ready to assist</div>
        </div>
    </div>
    
    <script src="popup.js"></script>
</body>
</html>
